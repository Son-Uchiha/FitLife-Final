<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang chủ - FITLIFE PREMIUM FITNESS CLUB</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Montserrat:wght@600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="./tailwind.config.js"></script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .hero-clip {
        clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
      }
      .glass-card {
        background: rgba(18, 20, 20, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary selection:text-on-primary"
  >
    <!-- TopNavBar Component -->
    <nav
      class="sticky top-0 z-50 bg-surface border-b border-surface-variant w-full"
    >
      <!--  Lớp này đóng vai trò như một bức tường mờ đục chắn giữa màn hình. -->
      <div class="absolute inset-0 bg-background z-40"></div>
      <div
        class="flex justify-between items-center px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto w-full relative"
      >
        <!-- Left Logo -->
        <div
          class="relative z-50 font-headline-md text-headline-md font-bold tracking-tighter text-primary"
        >
          FITLIFE
        </div>
        <!-- TopNav Right -->
        <ul
          id="nav-menu"
          class="flex opacity-0 absolute top-[-500px] left-0 w-full glass-card flex-col gap-4 py-4 px-margin-mobile md:static md:w-auto md:flex-row md:bg-transparent md:border-none md:py-0 md:px-0 md:gap-8 md:shadow-none md:opacity-100 transition-all duration-500 ease-in-out -z-10 md:z-50"
        >
          <li>
            <a
              class="text-primary font-bold border-b-2 border-primary pb-1 font-label-md text-label-md hover:text-primary transition-colors duration-200"
              href="index.html"
              >Home</a
            >
          </li>
          <li>
            <a
              class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors duration-200"
              href="classes.html"
              >Classes</a
            >
          </li>
          <li>
            <a
              class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors duration-200"
              href="contact.html"
              >Contact</a
            >
          </li>
        </ul>
        <div class="flex items-center gap-4 relative z-50">
          <button
            aria-label="Account"
            class="text-on-surface-variant hover:text-primary transition-colors duration-200"
          >
            <span class="material-symbols-outlined">account_circle</span>
          </button>
          <button
            class="hidden md:flex bg-secondary-container text-on-secondary-container px-6 py-2 rounded font-label-md text-label-md uppercase tracking-wider hover:bg-secondary-fixed-dim transition-colors scale-95 active:scale-90"
          >
            JOIN NOW
          </button>
          <!-- Mobile Menu Button -->
          <button
            id="mobile-menu-btn"
            class="md:hidden text-on-surface-variant hover:text-primary transition-colors"
          >
            <span id="menu-icon" class="material-symbols-outlined">menu</span>
          </button>
        </div>
      </div>
    </nav>
    <script src="Menu.js"></script>
  </body>
</html>
